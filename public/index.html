<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MyDoctor – Find doctors, clinics, and healthcare services across Iraq. Book appointments, view clinic details, and explore medical specialties easily." />
  <title>MyDoctor – Healthcare in Your Hands</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: linear-gradient(135deg, #4A90E2, #5CC6BA);
      color: white;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
      margin: 10px 0;
      font-weight: bold;
    }

    p.subtitle {
      font-size: 16px;
      opacity: 0.9;
      margin-top: 0;
    }

    .container {
      padding: 30px 20px;
      max-width: 600px;
      margin: auto;
    }

    h2 {
      color: #4A90E2;
    }

    .btn {
      display: block;
      width: 90%;
      max-width: 300px;
      margin: 12px auto;
      padding: 14px;
      background: #4A90E2;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #357ABD;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <img src="stethoscope-icon.png" alt="MyDoctor Logo" class="logo">
    <h1>MyDoctor</h1>
    <p class="subtitle">Iraq’s Trusted App for Doctors & Clinics</p>
  </header>

  <div class="container">
    <h2>Important Documents</h2>

    <a href="/privacy.html" class="btn">Privacy Policy</a>
    <a href="/terms.html" class="btn">Terms of Use</a>
    <a href="/data-deletion.html" class="btn">Data Deletion Policy</a>
  </div>

  <footer>
    &copy; 2025 MyDoctor. All rights reserved.
  </footer>

</body>
</html>
