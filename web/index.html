<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

 
  <meta name="description" content="Book doctor appointments easily and securely with TrustyDr." />

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TrustyDr" />
  <meta name="application-name" content="TrustyDr">
  <meta name="theme-color" content="#4A90E2" />

  <!-- iOS Icons -->
 <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-patient-v2.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-patient-v2.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-patient-v2.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-patient-v2.png">


  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <title>TrustyDr – Patient App</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(135deg, #5CC6BA, #4A90E2);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #flutter-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #5CC6BA, #4A90E2);
      z-index: 9999;
      /* Safety: never block touch events when transparent/fading */
      transition: opacity 0.3s;
    }
    #flutter-loader.hidden {
      pointer-events: none;
      opacity: 0;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo img {
      width: 190px;
      height: auto;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.15));
    }

    .subtitle {
      margin-top: 12px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 6px;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .spinner {
      margin-top: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid #e5e7eb;
      border-top-color: #ffffff;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .logo img {
        width: 120px;
      }
    }
  </style>
</head>

<body>
  <div id="flutter-loader">
    <div class="loader-content">
      <div class="logo">
        <img src="icons/white-logo.png" alt="TrustyDr Logo" />
      </div>
      <div class="subtitle">Patient App</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script>
 window.addEventListener('load', function () {
  const loader = document.getElementById('flutter-loader');
  if (loader) {
    loader.style.pointerEvents = 'none'; // immediately stop absorbing touches
    loader.style.opacity = '0';
    setTimeout(() => loader.remove(), 300);
  }
});

  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
