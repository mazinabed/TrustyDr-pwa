name: trustydr
description: "A production-ready Doctor Appointment App for Iraq"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Animation ---
  cupertino_icons: ^1.0.8
  fluttertoast: ^9.0.0
  dotted_border: ^3.1.0
  flutter_spinkit: ^5.1.0
  page_transition: ^2.0.4
  font_awesome_flutter: ^10.10.0
  dotted_line: ^3.1.0
  intl_phone_number_input: ^0.7.0+2
  google_maps_flutter: ^2.1.1
  flutter_slidable: ^4.0.3
  dropdown_button2: ^2.3.9
  easy_localization: ^3.0.5
  table_calendar: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0

  # --- System & Utils ---
  
  shared_preferences: ^2.1.1
  url_launcher: ^6.3.2
  image_picker: ^0.8.7+5

  # --- State Management (Riverpod 3.x only) ---
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2

  # --- Firebase ---
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  firebase_messaging: ^16.0.2
  firebase_storage: ^13.0.2

  # --- Auth & Social ---
  
  google_sign_in: ^6.0.0

  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3


  # --- Icons ---
  flutter_launcher_icons: ^0.14.4

  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^3.0.2
  flutter_native_splash: ^2.4.0

# ✅ THIS MUST BE AT ROOT LEVEL (NOT INDENTED)
flutter_native_splash:
  color: "#4B96DF"
  image: assets/icons/logo.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#4B96DF"
    image: assets/icons/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#4B96DF"
  adaptive_icon_foreground: "assets/icons/logo.png"
  remove_alpha_ios: true



flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/doctor/
    - assets/icons/
    - assets/lab/
    - assets/user/
    - assets/payment_icon/amazon_pay.png
    - assets/user/placeholder_user.png
    - assets/data/
    - lib/l10n/
    - assets/data/specialties.json
    - assets/data/doctors.json
    - assets/data/users.json
    - assets/data/reviews.json

 
fonts:
  - family: Cairo
    fonts:
      - asset: assets/fonts/Cairo-Regular.ttf
        weight: 400
      - asset: assets/fonts/Cairo-Medium.ttf
        weight: 500
      - asset: assets/fonts/Cairo-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Cairo-Bold.ttf
        weight: 700

